<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карта достопримечательностей Туркменистана</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg:       #07111f;
      --panel:    #111827;
      --panel2:   #1a2438;
      --border:   #1e3a5f;
      --accent:   #3b82f6;
      --accent2:  #60a5fa;
      --red:      #e63939;
      --gold:     #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --selected: #1d4ed8;
      --panel-w:  280px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg,#0d1b2e 0%,#0f2645 50%,#0d1b2e 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px 12px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    header::before {
      content:'★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★';
      position:absolute; top:4px; left:50%; transform:translateX(-50%);
      font-size:9px; color:var(--gold); opacity:.35; letter-spacing:6px; white-space:nowrap;
    }
    .header-text h1 { font-size:1.2rem; font-weight:normal; letter-spacing:.06em; color:#f1f5f9; }
    .header-text p  { font-size:.75rem; color:var(--gold); letter-spacing:.12em; margin-top:2px; font-style:italic; }
    .header-badge   { background:var(--border); border:1px solid var(--accent); border-radius:6px; padding:6px 14px; font-size:.72rem; color:var(--accent2); }

    .main { display:flex; flex:1; overflow:hidden; min-height:0; }

    #sidebar {
      width:var(--panel-w); min-width:var(--panel-w);
      background:var(--panel); border-right:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
    }
    .sidebar-section { padding:14px 14px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .sidebar-label   { font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }

    #sight-wrap { flex:1; overflow-y:auto; display:flex; flex-direction:column; }

    #sight-list { list-style:none; overflow-y:auto; flex:1; }
    .region-header {
      padding:7px 14px 5px;
      font-size:.58rem; letter-spacing:.16em; text-transform:uppercase;
      color:var(--gold); background:var(--panel2);
      border-top:1px solid var(--border); border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:2;
    }
    #sight-list li {
      display:flex; align-items:center; gap:9px;
      padding:7px 14px; cursor:pointer;
      border-left:3px solid transparent;
      transition:background .15s,border-color .15s;
      font-size:.79rem; line-height:1.3;
    }
    #sight-list li:hover  { background:var(--panel2); border-left-color:var(--accent); }
    #sight-list li.active { background:#162035; border-left-color:var(--accent); }
    .sight-emoji { font-size:.9rem; flex-shrink:0; line-height:1; }
    .sight-num   { width:19px;height:19px;border-radius:50%;background:var(--selected);color:#fff;font-size:.62rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:monospace; }
    .sight-dot   { width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0; }
    #sight-list li.active .sight-dot { background:var(--accent); }

    #route-section { flex-shrink:0; display:flex; flex-direction:column; max-height:38%; border-top:1px solid var(--border); }
    #route-list    { list-style:none;overflow-y:auto;flex:1;padding:0 0 8px; }
    #route-list li { display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:.78rem;border-bottom:1px solid #161f30;cursor:pointer;transition:background .15s; }
    #route-list li:hover { background:var(--panel2); }
    .route-idx    { font-size:.65rem;font-family:monospace;color:var(--accent2);min-width:18px; }
    .route-name   { flex:1;color:var(--text); }
    .route-remove { color:var(--muted);font-size:.75rem;opacity:.6; }
    .route-remove:hover { color:var(--red);opacity:1; }
    #route-empty  { color:var(--muted);font-size:.75rem;font-style:italic;padding:10px 14px; }

    .btn-reset {
      margin:10px 14px 14px; padding:9px 14px;
      background:var(--red); color:#fff; border:none; border-radius:6px;
      font-family:inherit; font-size:.8rem; cursor:pointer;
      transition:opacity .15s,transform .1s; flex-shrink:0;
    }
    .btn-reset:hover  { opacity:.85; transform:scale(1.01); }
    .btn-reset:active { transform:scale(.98); }

    #map { flex:1; z-index:1; }

    /* Тёмный фильтр поверх OSM тайлов — сохраняет контуры, но делает тёмным */
    .leaflet-tile-pane {
      filter: brightness(0.3) saturate(0.5) hue-rotate(190deg) contrast(1.1);
    }

    .leaflet-popup-content-wrapper {
      background:#0f2040; border:1px solid var(--border); border-radius:8px;
      color:var(--text); box-shadow:0 8px 30px rgba(0,0,0,.6); max-width:230px;
    }
    .leaflet-popup-tip { background:#0f2040; }
    .leaflet-popup-content { font-family:inherit; font-size:.8rem; line-height:1.55; }
    .popup-emoji { font-size:1.8rem; display:block; margin-bottom:4px; }
    .popup-title { font-size:.9rem; font-weight:bold; color:var(--gold); margin-bottom:5px; }
    .leaflet-popup-close-button { color:var(--muted) !important; }

    .marker-label {
      background: rgba(8,18,36,.88) !important;
      border: 1px solid rgba(96,165,250,.3) !important;
      border-radius: 5px !important;
      color: #cbd5e1 !important;
      font-family: Georgia,serif !important;
      font-size: 11.5px !important;
      line-height: 1.35 !important;
      padding: 3px 8px !important;
      white-space: nowrap !important;
      pointer-events: none !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.55) !important;
    }
    .marker-label::before { display:none !important; }
    .marker-label.active-label {
      border-color: rgba(59,130,246,.75) !important;
      color: #bfdbfe !important;
      background: rgba(15,32,64,.95) !important;
    }

    .leaflet-control-attribution {
      background:rgba(7,17,31,.8) !important;
      color:var(--muted) !important;
      font-size:9px !important;
    }
    .leaflet-control-attribution a { color:var(--muted) !important; }

    @media(max-width:640px){
      :root{--panel-w:100%;}
      .main{flex-direction:column;}
      /* Сайдбар занимает только треть экрана */
      #sidebar{
        width:100%; min-width:100%;
        height:38vh; max-height:38vh;
        border-right:none; border-bottom:1px solid var(--border);
        flex-shrink:0;
      }
      #sight-wrap{ flex:1; min-height:0; }
      #route-section{ max-height:30%; }
      /* Карта занимает остаток — 100vh минус header минус sidebar */
      #map{ flex:1; min-height:0; }
      header{ padding:10px 14px; }
      .header-text h1{ font-size:.92rem; }
      .header-badge{ display:none; }
    }
  </style>

</head>
<body>

<header>
  <div class="header-text">
    <h1>Карта достопримечательностей Туркменистана</h1>
    <p>Выбирай места — и смотри маршрут</p>
  </div>
  <div class="header-badge">🇹🇲 Туркменистан</div>
</header>

<div class="main">
  <aside id="sidebar">
    <div class="sidebar-section" style="flex-shrink:0"><div class="sidebar-label">Достопримечательности</div></div>
    <div id="sight-wrap">
      <ul id="sight-list"></ul>
    </div>
    <div id="route-section">
      <div class="sidebar-section"><div class="sidebar-label">Выбранный маршрут</div></div>
      <ul id="route-list" style="overflow-y:auto;flex:1;list-style:none;padding:0 0 4px;"><li id="route-empty">Ничего не выбрано</li></ul>
      <button class="btn-reset" onclick="resetAll()">✕ Сбросить всё</button>
    </div>
  </aside>
  <div id="map"></div>
</div>

<script>
const REGIONS = [
  {
    name: 'Ашхабад',
    sights: [
      { name:'Монумент Нейтралитета',             emoji:'🗽', coords:[37.9607,58.3261], desc:'Символ нейтралитета Туркменистана, 75-метровый монумент с вращающейся фигурой Туркменбаши на вершине.' },
      { name:'Монумент Независимости',            emoji:'🏛️', coords:[37.9450,58.3900], desc:'Величественный монумент в честь независимости Туркменистана, окружён фонтанами и парком.' },
      { name:'Алем',                              emoji:'🎡', coords:[37.9550,58.3450], desc:'Крытый колесо обозрения в здании — самое большое закрытое колесо обозрения в мире.' },
      { name:'Национальный музей Туркменистана',  emoji:'🏺', coords:[37.9480,58.3870], desc:'Крупнейший музей страны с богатой коллекцией артефактов от древности до наших дней.' },
      { name:'Дворец бракосочетаний Багт кошги',  emoji:'💒', coords:[37.9620,58.4010], desc:'Дворец в форме восьмиконечной звезды — один из самых необычных свадебных дворцов в мире.' },
      { name:'Мечеть Эртогрул Газы',              emoji:'🕌', coords:[37.9580,58.3390], desc:'Красивая мечеть в османском стиле, подарок Турции туркменскому народу.' },
      { name:'Парк Ашхабад',                      emoji:'🌳', coords:[37.9700,58.3600], desc:'Большой городской парк с аттракционами, фонтанами и зонами отдыха.' },
      { name:'Ниса',                              emoji:'🏯', coords:[37.9667,58.1950], desc:'Столица Парфянского царства, объект ЮНЕСКО — руины древней крепости I в. до н.э.' },
    ]
  },
  {
    name: 'Ахалский велаят',
    sights: [
      { name:'Дарваза (Врата ада)',               emoji:'🔥', coords:[40.2525,58.4396], desc:'Кратер горящего природного газа в пустыне Каракумы, горит с 1971 года.' },
      { name:'Подземное озеро Ков-Ата',           emoji:'💧', coords:[38.2180,57.8520], desc:'Уникальное подземное серное озеро в пещере, популярное место для купания.' },
      { name:'Мечеть Туркменбаши Рухы',           emoji:'🕌', coords:[38.0178,58.2528], desc:'Одна из крупнейших мечетей Центральной Азии, вмещает до 10 000 человек.' },
      { name:'Конный комплекс Ахалтекинец',       emoji:'🐎', coords:[37.9900,58.4200], desc:'Комплекс, посвящённый легендарной породе ахалтекинских лошадей — национального символа Туркменистана.' },
    ]
  },
  {
    name: 'Марыйский велаят',
    sights: [
      { name:'Древний Мерв',                      emoji:'🏛️', coords:[37.6628,62.1925], desc:'Один из древнейших городов мира на Великом шёлковом пути, объект ЮНЕСКО.' },
      { name:'Мавзолей Султана Санджара',         emoji:'🕌', coords:[37.6650,62.1870], desc:'Величественный мавзолей XII века — жемчужина сельджукской архитектуры, объект ЮНЕСКО.' },
      { name:'Гяур-Кала',                         emoji:'🏚️', coords:[37.6900,62.1500], desc:'Руины древнего парфянского города, входят в комплекс Древнего Мерва.' },
    ]
  },
  {
    name: 'Балканский велаят',
    sights: [
      { name:'Янгыкала',                          emoji:'🏜️', coords:[40.6322,54.9267], desc:'Цветные каньоны и скалы — «огненная крепость» Туркменистана, поражающая закатными красками.' },
      { name:'Каньон Янгысув',                    emoji:'🌊', coords:[40.5500,54.8000], desc:'Живописный каньон с рекой среди красных скал Балканского велаята.' },
      { name:'Аваза',                             emoji:'🏖️', coords:[40.0167,52.9833], desc:'Национальная туристическая зона на берегу Каспийского моря с современными отелями.' },
      { name:'Гозли-Ата',                         emoji:'⛪', coords:[40.1500,54.2000], desc:'Средневековый некрополь с мавзолеями, священное место паломничества туркменского народа.' },
    ]
  },
  {
    name: 'Дашогузский велаят',
    sights: [
      { name:'Куня-Ургенч',                       emoji:'🕌', coords:[42.3277,59.1544], desc:'Руины древней столицы Хорезма с мавзолеями и минаретом XI–XIV вв., объект ЮНЕСКО.' },
      { name:'Минарет Кутлуг-Тимура',             emoji:'🗼', coords:[42.3220,59.1530], desc:'Самый высокий средневековый минарет Центральной Азии (60 м), XIV век.' },
      { name:'Мавзолей Тюрабек-ханым',            emoji:'🏛️', coords:[42.3240,59.1490], desc:'Шедевр средневековой архитектуры XIV века с уникальной мозаичной отделкой купола.' },
    ]
  },
  {
    name: 'Лебапский велаят',
    sights: [
      { name:'Древний Амуль',                     emoji:'🏛️', coords:[39.1000,63.5500], desc:'Руины одного из древнейших городов Средней Азии на берегу Амударьи.' },
      { name:'Пещера Койтендаг',                  emoji:'🦇', coords:[37.7500,66.5000], desc:'Карстовая пещера с подземными озёрами и уникальными сталактитами в горах Койтендага.' },
      { name:'Плато динозавров Койтендаг',        emoji:'🦕', coords:[37.8000,66.4500], desc:'Плато с сотнями отпечатков следов динозавров юрского периода — уникальный природный памятник.' },
    ]
  },
];

// Разворачиваем в плоский массив с глобальными id
const SIGHTS = [];
REGIONS.forEach(region => {
  region.sights.forEach(s => {
    SIGHTS.push({ id: SIGHTS.length, region: region.name, ...s });
  });
});

let selectedOrder = [];

// ── Карта с тайлами OpenStreetMap ──
// Границы Туркменистана с небольшим отступом
const TKM_BOUNDS = L.latLngBounds(
  [33.0, 49.5],   // юго-запад с запасом
  [44.5, 69.5]    // северо-восток с запасом
);

const map = L.map('map', {
  center: [39.2, 59.5],
  zoom: 5,
  minZoom: 5,
  maxZoom: 13,
  zoomControl: true,
  maxBounds: TKM_BOUNDS,
  maxBoundsViscosity: 0.8
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
  subdomains: ['a','b','c']
}).addTo(map);

// ── ICON FACTORY ──
function makeIcon(sight, isActive, orderNum) {
  const size = 36;
  const bg  = isActive ? '#2563eb' : '#d97706';
  const bdr = isActive ? '#1d4ed8' : '#92400e';
  const inner = isActive
    ? `<span style="transform:rotate(45deg);font-size:12px;color:#fff;font-weight:bold;font-family:monospace;">${orderNum}</span>`
    : `<span style="transform:rotate(45deg);font-size:17px;line-height:1;">${sight.emoji}</span>`;
  return L.divIcon({
    html:`<div style="width:${size}px;height:${size}px;background:${bg};border:2px solid ${bdr};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.6);">${inner}</div>`,
    className:'',
    iconSize:[size,size],
    iconAnchor:[size/2,size],
    popupAnchor:[0,-size-4]
  });
}

// ── POLYLINE ──
let routeLine = null;
function updatePolyline() {
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  if (selectedOrder.length < 2) return;
  routeLine = L.polyline(selectedOrder.map(id => SIGHTS[id].coords), {
    color:'#e63939', weight:4, dashArray:'8,12', opacity:.9
  }).addTo(map);
}

// ── MARKERS + LABELS ──
const markers = {};
const labelTooltips = {};

SIGHTS.forEach(sight => {
  const m = L.marker(sight.coords, { icon: makeIcon(sight,false,0) })
    .addTo(map)
    .bindPopup(
      `<span class="popup-emoji">${sight.emoji}</span><div class="popup-title">${sight.name}</div><div>${sight.desc}</div>`,
      { maxWidth:225 }
    );
  m.on('click', () => toggleSight(sight.id));
  markers[sight.id] = m;

  const tip = L.tooltip({
    permanent:true, direction:'right', offset:[14,-20],
    className:'marker-label', interactive:false
  })
    .setContent(`${sight.emoji}&nbsp;${sight.name}`)
    .setLatLng(sight.coords);
  map.addLayer(tip);
  labelTooltips[sight.id] = tip;
});

// ── SIDEBAR — с заголовками регионов ──
const sightListEl = document.getElementById('sight-list');
REGIONS.forEach(region => {
  // Заголовок региона
  const hdr = document.createElement('li');
  hdr.className = 'region-header';
  hdr.textContent = region.name;
  hdr.style.cssText = 'padding:7px 14px 5px;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);background:var(--panel2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);pointer-events:none;list-style:none;';
  sightListEl.appendChild(hdr);

  region.sights.forEach(sight => {
    const fullSight = SIGHTS.find(s => s.name === sight.name && s.region === region.name);
    const li = document.createElement('li');
    li.id = `sl-${fullSight.id}`;
    li.innerHTML = `<span class="sight-emoji">${fullSight.emoji}</span><span class="sight-dot" id="dot-${fullSight.id}"></span><span>${fullSight.name}</span>`;
    li.addEventListener('click', () => toggleSight(fullSight.id));
    sightListEl.appendChild(li);
  });
});

// ── ROUTE LIST ──
function renderRouteList() {
  const ul = document.getElementById('route-list');
  const empty = document.getElementById('route-empty');
  Array.from(ul.children).forEach(c => { if (c.id !== 'route-empty') ul.removeChild(c); });
  if (!selectedOrder.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  selectedOrder.forEach((id, idx) => {
    const s = SIGHTS[id];
    const li = document.createElement('li');
    li.innerHTML = `<span class="route-idx">${idx+1}.</span><span style="font-size:.95rem">${s.emoji}</span><span class="route-name">${s.name}</span><span class="route-remove" title="Убрать">✕</span>`;
    li.querySelector('.route-remove').addEventListener('click', e => { e.stopPropagation(); toggleSight(id); });
    ul.appendChild(li);
  });
}

// ── TOGGLE / REFRESH / RESET ──
function toggleSight(id) {
  const idx = selectedOrder.indexOf(id);
  if (idx === -1) {
    selectedOrder.push(id);
    markers[id].openPopup();
    map.panTo(SIGHTS[id].coords, { animate:true, duration:.5 });
  } else {
    selectedOrder.splice(idx, 1);
    markers[id].closePopup();
  }
  refreshUI();
}

function refreshUI() {
  SIGHTS.forEach(sight => {
    const oi = selectedOrder.indexOf(sight.id);
    const isActive = oi !== -1;
    markers[sight.id].setIcon(makeIcon(sight, isActive, oi+1));
    const tipEl = labelTooltips[sight.id]?.getElement?.();
    if (tipEl) tipEl.classList.toggle('active-label', isActive);
    const li = document.getElementById(`sl-${sight.id}`);
    if (isActive) {
      li.classList.add('active');
      const dot = li.querySelector('.sight-dot');
      if (dot) {
        const num = Object.assign(document.createElement('span'), { className:'sight-num', id:`dot-${sight.id}`, textContent:oi+1 });
        li.replaceChild(num, dot);
      } else {
        const n = document.getElementById(`dot-${sight.id}`);
        if (n) n.textContent = oi+1;
      }
    } else {
      li.classList.remove('active');
      const num = document.getElementById(`dot-${sight.id}`);
      if (num?.classList.contains('sight-num')) {
        const dot = Object.assign(document.createElement('span'), { className:'sight-dot', id:`dot-${sight.id}` });
        li.replaceChild(dot, num);
      }
    }
  });
  updatePolyline();
  renderRouteList();
}

function resetAll() { selectedOrder = []; map.closePopup(); refreshUI(); }

refreshUI();
</script>

</body>
</html>
